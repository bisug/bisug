name: Generate Snake Animation

on:
  schedule:
    # Runs daily at 00:00 UTC
    - cron: "0 0 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

# Cancel any in-progress run for the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generate cyberpunk snake SVGs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?color_snake=#06b6d4&color_dots=#0f0b1f,#2e1065,#4c1d95,#7c3aed,#c4b5fd
            dist/snake-dark.svg?color_snake=#06b6d4&color_dots=#080615,#1e1040,#3b1fa0,#6d28d9,#a78bfa

      - name: Push snake SVGs to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./dist
          keep_files: true
          commit_message: "chore: update cyberpunk snake animation [skip ci]"
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
