<svg width="1000" height="30" viewBox="0 0 1000 30" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    ]]></style>
    <linearGradient id="lg" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%"   stop-color="#00ffff" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#00ffff"/>
      <stop offset="50%"  stop-color="#a78bfa"/>
      <stop offset="80%"  stop-color="#ff0040"/>
      <stop offset="100%" stop-color="#ff0040" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Bottom Accent Line -->
  <rect x="0" y="5" width="1000" height="1.5" fill="url(#lg)" opacity="0.8"/>
  
  <!-- Terminal Status -->
  <g transform="translate(500, 22)" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="8" fill="#374151" letter-spacing="2">
    <text>TERMINAL_SECURE &#9642; DATA_SYNC_COMPLETE &#9642; END_OF_STREAM</text>
  </g>

  <!-- Corner Ticks -->
  <path d="M 20 5 L 20 15 M 20 5 L 30 5" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.5"/>
  <path d="M 980 5 L 980 15 M 980 5 L 970 5" fill="none" stroke="#ff0040" stroke-width="1" opacity="0.5"/>
</svg>
