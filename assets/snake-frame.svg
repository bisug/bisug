<svg width="1000" height="64" viewBox="0 0 1000 64" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <linearGradient id="sf-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#7c3aed"/>
      <stop offset="50%"  stop-color="#06b6d4"/>
      <stop offset="80%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="sf-scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0f0b1f"/>
      <stop offset="100%" stop-color="#080615"/>
    </linearGradient>

    <pattern id="sf-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e1040" stroke-width="1"/>
      <circle cx="0" cy="0" r="1" fill="#06b6d4" opacity="0.12"/>
    </pattern>

  </defs>

  <!-- Base -->
  <rect width="1000" height="64" fill="url(#sf-scan)"/>
  <rect width="1000" height="64" fill="url(#sf-grid)"/>

  <!-- Top rule -->
  <rect x="0" y="0" width="1000" height="2" fill="url(#sf-line)"/>
  <!-- Bottom rule (dimmer) -->
  <rect x="0" y="62" width="1000" height="2" fill="url(#sf-line)" opacity="0.45"/>

  <!-- ── LEFT BLOCK ── -->
  <!-- Bracket -->
  <path d="M 18 14 L 8 14 L 8 50 L 18 50"
        fill="none" stroke="#06b6d4" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>

  <!-- Pulsing ONLINE dot -->
  <circle cx="30" cy="27" r="3.5" fill="#22d3ee">
    <animate attributeName="opacity" values="1;0.15;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <!-- Label -->
  <text x="39" y="31"
        font-family="'Courier New', Courier, monospace"
        font-size="9" font-weight="700" letter-spacing="2"
        fill="#22d3ee" opacity="0.95">LIVE</text>

  <!-- Sub-label -->
  <text x="28" y="47"
        font-family="'Courier New', Courier, monospace"
        font-size="7.5" letter-spacing="1.5"
        fill="#7c3aed" opacity="0.75">CONTRIB::TRACE</text>

  <!-- ── CENTER BLOCK ── -->
  <text x="500" y="28"
        font-family="'Courier New', Courier, monospace"
        font-size="12" font-weight="700" letter-spacing="5"
        text-anchor="middle"
        fill="#c4b5fd" opacity="0.95">[ BISUG // ACTIVITY_GRID ]</text>

  <text x="500" y="48"
        font-family="'Courier New', Courier, monospace"
        font-size="7.5" letter-spacing="3"
        text-anchor="middle"
        fill="#475569" opacity="0.9">SNAKE_ENGINE_v3 &#9642; PALETTE::VIOLET_CYAN &#9642; STREAM::ON</text>

  <!-- ── RIGHT BLOCK ── -->
  <!-- Bracket -->
  <path d="M 982 14 L 992 14 L 992 50 L 982 50"
        fill="none" stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>

  <!-- Pulsing STATUS dot -->
  <circle cx="970" cy="27" r="3.5" fill="#a78bfa">
    <animate attributeName="opacity" values="0.9;0.1;0.9" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <!-- Label -->
  <text x="966" y="31"
        font-family="'Courier New', Courier, monospace"
        font-size="9" font-weight="700" letter-spacing="2"
        text-anchor="end"
        fill="#a78bfa" opacity="0.95">SECURE</text>

  <!-- Sub-label -->
  <text x="972" y="47"
        font-family="'Courier New', Courier, monospace"
        font-size="7.5" letter-spacing="1.5"
        text-anchor="end"
        fill="#06b6d4" opacity="0.75">PORT::ENC</text>

  <!-- Decorative floating hex -->
  <text x="160" y="20" font-family="'Courier New', Courier, monospace"
        font-size="6.5" fill="#4c1d95" opacity="0.5">0xC4B5FD</text>
  <text x="160" y="54" font-family="'Courier New', Courier, monospace"
        font-size="6.5" fill="#4c1d95" opacity="0.5">10110100</text>
  <text x="820" y="20" font-family="'Courier New', Courier, monospace"
        font-size="6.5" fill="#164e63" opacity="0.5" text-anchor="end">0x06B6D4</text>
  <text x="840" y="54" font-family="'Courier New', Courier, monospace"
        font-size="6.5" fill="#164e63" opacity="0.5" text-anchor="end">01101001</text>

</svg>
