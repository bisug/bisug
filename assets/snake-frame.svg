<svg width="1000" height="70" viewBox="0 0 1000 70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    ]]></style>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00ffff" stop-opacity="0"/>
      <stop offset="15%"  stop-color="#00ffff"/>
      <stop offset="50%"  stop-color="#a78bfa"/>
      <stop offset="85%"  stop-color="#ff0040"/>
      <stop offset="100%" stop-color="#ff0040" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#1a0f35" stroke-width="1"/>
      <circle cx="0" cy="0" r="1.2" fill="#00ffff" opacity="0.15"/>
    </pattern>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f0a1e"/>
      <stop offset="100%" stop-color="#090612"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="70" fill="url(#bg)"/>
  <rect width="1000" height="70" fill="url(#grid)" opacity="0.7"/>

  <!-- Border & Frames -->
  <rect x="0" y="0" width="1000" height="1.5" fill="url(#lg)"/>
  <rect x="0" y="68.5" width="1000" height="1.5" fill="url(#lg)" opacity="0.6"/>

  <!-- Left Side Interface -->
  <g transform="translate(25, 35)">
    <path d="M 0 -20 L -10 -20 L -10 20 L 0 20" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.7"/>
    <!-- Simulated Glow Label -->
    <text x="5" y="-5" font-family="'Share Tech Mono', monospace" font-size="9" fill="#00ffff" opacity="0.3" letter-spacing="1">TRACE::CONTRIBUTION</text>
    <text x="4" y="-6" font-family="'Share Tech Mono', monospace" font-size="9" fill="#00ffff" letter-spacing="1">TRACE::CONTRIBUTION</text>
    
    <g transform="translate(5, 12)">
       <circle cx="0" cy="0" r="3" fill="#00e676">
         <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
       </circle>
       <text x="8" y="3" font-family="'Share Tech Mono', monospace" font-size="8" fill="#00e676" opacity="0.8">SYSTEM_UP</text>
    </g>
  </g>

  <!-- Center Branding -->
  <g transform="translate(500, 35)" text-anchor="middle">
    <!-- Outer glow layers -->
    <text y="0" font-family="'Share Tech Mono', monospace" font-size="11" font-weight="700" fill="#a78bfa" opacity="0.2" letter-spacing="4">[ BISUG // ACTIVITY_GRID ]</text>
    <text y="-1" font-family="'Share Tech Mono', monospace" font-size="11" font-weight="700" fill="#a78bfa" letter-spacing="4">[ BISUG // ACTIVITY_GRID ]</text>
    
    <text y="18" font-family="'Share Tech Mono', monospace" font-size="7" fill="#374151" letter-spacing="3" opacity="0.8">
      SNAKE_ENGINE_v3.2 // CYAN_STREAK_ACTIVE
    </text>
  </g>

  <!-- Right Side Interface -->
  <g transform="translate(975, 35)" text-anchor="end">
    <path d="M 0 -20 L 10 -20 L 10 20 L 0 20" fill="none" stroke="#ff0040" stroke-width="1.5" opacity="0.7"/>
    <text x="-5" y="-5" font-family="'Share Tech Mono', monospace" font-size="9" fill="#ff0040" opacity="0.3" letter-spacing="1">PORT::SECURE</text>
    <text x="-6" y="-6" font-family="'Share Tech Mono', monospace" font-size="9" fill="#ff0040" letter-spacing="1">PORT::SECURE</text>
    
    <g transform="translate(-5, 12)">
       <text x="-12" y="3" font-family="'Share Tech Mono', monospace" font-size="8" fill="#ff0040" opacity="0.8">ENCRYPTED</text>
       <circle cx="0" cy="0" r="3" fill="#ff0040">
         <animate attributeName="opacity" values="0.8;0.1;0.8" dur="2s" repeatCount="indefinite"/>
       </circle>
    </g>
  </g>

  <!-- Decorative Hex Data (Floating) -->
  <g font-family="'Share Tech Mono', monospace" font-size="6" fill="#a78bfa" opacity="0.2">
    <text x="150" y="25">0x7F4A</text>
    <text x="820" y="55">0xDE21</text>
    <text x="180" y="55">110101</text>
    <text x="790" y="25">011010</text>
  </g>
</svg>

