<svg width="100%" height="200" viewBox="0 0 1000 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Rubik+Glitch&family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');
    ]]></style>

    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1a0f35" stroke-width="1"/>
      <circle cx="0" cy="0" r="1" fill="#00ffff" opacity="0.22"/>
    </pattern>

    <pattern id="scan" width="2" height="4" patternUnits="userSpaceOnUse">
      <rect width="2" height="2" fill="#000000" opacity="0.1"/>
    </pattern>

    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="4.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Glitch clip slices -->
    <clipPath id="gc1"><rect x="0" y="60" width="1000" height="20"/></clipPath>
    <clipPath id="gc2"><rect x="0" y="88" width="1000" height="15"/></clipPath>
    <clipPath id="gc3"><rect x="0" y="102" width="1000" height="11"/></clipPath>

    <!-- Typing Reveal Masks (15s total cycle, 3s per line) -->
    <clipPath id="tp1"><rect x="250" y="135" height="30" width="0"><animate attributeName="width" values="0;500;500;0" keyTimes="0;0.1;0.18;0.2" dur="15s" repeatCount="indefinite" /></rect></clipPath>
    <clipPath id="tp2"><rect x="250" y="135" height="30" width="0"><animate attributeName="width" values="0;0;500;500;0" keyTimes="0;0.2;0.3;0.38;0.4" dur="15s" repeatCount="indefinite" /></rect></clipPath>
    <clipPath id="tp3"><rect x="250" y="135" height="30" width="0"><animate attributeName="width" values="0;0;500;500;0" keyTimes="0;0.4;0.5;0.58;0.6" dur="15s" repeatCount="indefinite" /></rect></clipPath>
    <clipPath id="tp4"><rect x="250" y="135" height="30" width="0"><animate attributeName="width" values="0;0;500;500;0" keyTimes="0;0.6;0.7;0.78;0.8" dur="15s" repeatCount="indefinite" /></rect></clipPath>
    <clipPath id="tp5"><rect x="250" y="135" height="30" width="0"><animate attributeName="width" values="0;0;500;500;0" keyTimes="0;0.8;0.9;0.98;1" dur="15s" repeatCount="indefinite" /></rect></clipPath>

    <!-- Text gradient (top-to-bottom white fade) -->
    <linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ccceff" stop-opacity="0.92"/>
    </linearGradient>

    <!-- Horizontal accent line gradient -->
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00ffff" stop-opacity="0"/>
      <stop offset="22%"  stop-color="#00ffff"/>
      <stop offset="78%"  stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>

    <!-- Background radial -->
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#0d0820"/>
      <stop offset="100%" stop-color="#05040a"/>
    </radialGradient>

    <!-- Vignette -->
    <radialGradient id="vig" cx="50%" cy="50%" r="65%">
      <stop offset="52%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.72"/>
    </radialGradient>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="1000" height="200" fill="url(#bg)"/>
  <rect width="1000" height="200" fill="url(#grid)"/>
  <ellipse cx="500" cy="100" rx="340" ry="85" fill="#4c1d95" opacity="0.055"/>

  <!-- ── CORNER BRACKETS ── -->
  <path d="M 18 52 L 18 18 L 58 18" fill="none" stroke="#00ffff" stroke-width="2" stroke-linecap="round" opacity="0.72">
    <animate attributeName="opacity" values="0.72;0.3;0.72" dur="3.5s" repeatCount="indefinite"/>
  </path>
  <path d="M 982 52 L 982 18 L 942 18" fill="none" stroke="#00ffff" stroke-width="2" stroke-linecap="round" opacity="0.72">
    <animate attributeName="opacity" values="0.72;0.3;0.72" dur="3.5s" repeatCount="indefinite"/>
  </path>
  <path d="M 18 148 L 18 182 L 58 182" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" opacity="0.68">
    <animate attributeName="opacity" values="0.68;0.28;0.68" dur="3.5s" begin="1.75s" repeatCount="indefinite"/>
  </path>
  <path d="M 982 148 L 982 182 L 942 182" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" opacity="0.68">
    <animate attributeName="opacity" values="0.68;0.28;0.68" dur="3.5s" begin="1.75s" repeatCount="indefinite"/>
  </path>

  <!-- ── LEFT TARGETING RING ── -->
  <g transform="translate(98, 100)" opacity="0.48">
    <circle cx="0" cy="0" r="38" fill="none" stroke="#00ffff" stroke-width="1" stroke-dasharray="10 5 3 5">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="27" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="5 9">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="13s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="4.5" fill="#00ffff" opacity="0.65"/>
    <circle cx="0" cy="0" r="2"   fill="#ffffff"/>
    <line x1="0"  y1="-49" x2="0"  y2="-40" stroke="#00ffff" stroke-width="1" opacity="0.55"/>
    <line x1="0"  y1="40"  x2="0"  y2="49"  stroke="#00ffff" stroke-width="1" opacity="0.55"/>
    <line x1="-49" y1="0" x2="-40" y2="0"   stroke="#a78bfa" stroke-width="1" opacity="0.55"/>
    <line x1="40"  y1="0" x2="49"  y2="0"   stroke="#a78bfa" stroke-width="1" opacity="0.55"/>
  </g>

  <!-- ── RIGHT TARGETING RING ── -->
  <g transform="translate(902, 100)" opacity="0.48">
    <circle cx="0" cy="0" r="38" fill="none" stroke="#00ffff" stroke-width="1" stroke-dasharray="10 5 3 5">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="27" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="5 9">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="13s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="4.5" fill="#00ffff" opacity="0.65"/>
    <circle cx="0" cy="0" r="2"   fill="#ffffff"/>
    <line x1="0"  y1="-49" x2="0"  y2="-40" stroke="#00ffff" stroke-width="1" opacity="0.55"/>
    <line x1="0"  y1="40"  x2="0"  y2="49"  stroke="#00ffff" stroke-width="1" opacity="0.55"/>
    <line x1="-49" y1="0" x2="-40" y2="0"   stroke="#a78bfa" stroke-width="1" opacity="0.55"/>
    <line x1="40"  y1="0" x2="49"  y2="0"   stroke="#a78bfa" stroke-width="1" opacity="0.55"/>
  </g>

  <!-- ── ATMOSPHERIC HEX / BINARY TEXT ── -->
  <g font-family="'Share Tech Mono','Courier New',monospace" font-size="8" fill="#00ffff" opacity="0.17" text-anchor="start">
    <text x="157" y="50">0xAF3B</text>
    <text x="157" y="63">10110100</text>
    <text x="157" y="76">11001010</text>
    <text x="157" y="91">0x2D7E</text>
    <text x="157" y="116">01101001</text>
    <text x="157" y="129">10100110</text>
    <text x="157" y="142">0xFF2D</text>
    <text x="157" y="155">11010011</text>
  </g>
  <g font-family="'Share Tech Mono','Courier New',monospace" font-size="8" fill="#a78bfa" opacity="0.17" text-anchor="end">
    <text x="843" y="50">0xDE4F</text>
    <text x="843" y="63">10011011</text>
    <text x="843" y="76">01110101</text>
    <text x="843" y="91">0xBA12</text>
    <text x="843" y="116">11000011</text>
    <text x="843" y="129">01001101</text>
    <text x="843" y="142">10110010</text>
    <text x="843" y="155">0xCF89</text>
  </g>

  <!-- ── TOP / BOTTOM ACCENT LINES ── -->
  <rect x="175" y="36"  width="650" height="1" fill="url(#lg)" opacity="0.5"/>
  <rect x="175" y="164" width="650" height="1" fill="url(#lg)" opacity="0.5"/>

  <!-- ── SCANLINE SWEEPING OVER TITLE ── -->
  <rect x="160" y="65" width="680" height="2" fill="#06b6d4" opacity="0.07">
    <animate attributeName="y" values="65;128;65" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- ── CHROMATIC ABERRATION: Constant Ghost Layers ── -->
  <!-- Magenta ghost — offset right, always present, disappears on glitch beats -->
  <text x="507" y="119"
    font-family="'Rubik Glitch','Orbitron','Courier New',monospace"
    font-weight="400" font-size="62" text-anchor="middle" letter-spacing="10"
    fill="#ff0040" opacity="0.38">
    BISU GHALAN
    <animate attributeName="x"
      values="507;495;510;503;507;508;494;500;507"
      dur="0.13s" repeatCount="indefinite" calcMode="discrete"/>
    <animate attributeName="opacity"
      values="0.38;0.38;0;0.38;0.38;0;0.38;0.38;0.38"
      dur="2.9s" repeatCount="indefinite" calcMode="discrete"/>
  </text>
  <!-- Cyan ghost — offset left, always present -->
  <text x="493" y="119"
    font-family="'Rubik Glitch','Orbitron','Courier New',monospace"
    font-weight="400" font-size="62" text-anchor="middle" letter-spacing="10"
    fill="#00ffff" opacity="0.38">
    BISU GHALAN
    <animate attributeName="x"
      values="493;505;491;497;493;492;506;500;493"
      dur="0.13s" repeatCount="indefinite" calcMode="discrete"/>
    <animate attributeName="opacity"
      values="0.38;0;0.38;0.38;0;0.38;0.38;0.38;0.38"
      dur="3.3s" repeatCount="indefinite" calcMode="discrete"/>
  </text>

  <!-- ── HIGH-INTENSITY SLICE GLITCH ── -->
  <!-- Top strip — cyan, hard offset -->
  <text x="500" y="119"
    font-family="'Rubik Glitch','Orbitron','Courier New',monospace"
    font-weight="400" font-size="62" text-anchor="middle" letter-spacing="10"
    fill="#00ffff" opacity="0" clip-path="url(#gc1)">
    BISU GHALAN
    <animate attributeName="opacity"
      values="0;0;0;0.92;0;0;0;0;0.72;0;0"
      keyTimes="0;0.15;0.19;0.21;0.24;0.5;0.68;0.71;0.73;0.76;1"
      dur="7s" repeatCount="indefinite" calcMode="discrete"/>
    <animate attributeName="x"
      values="500;492;500;500;500;500;500;500;509;500;500"
      keyTimes="0;0.19;0.21;0.24;0.5;0.68;0.71;0.73;0.73;0.76;1"
      dur="7s" repeatCount="indefinite" calcMode="discrete"/>
  </text>
  <!-- Middle strip — magenta, hard offset -->
  <text x="500" y="119"
    font-family="'Rubik Glitch','Orbitron','Courier New',monospace"
    font-weight="400" font-size="62" text-anchor="middle" letter-spacing="10"
    fill="#ff0040" opacity="0" clip-path="url(#gc2)">
    BISU GHALAN
    <animate attributeName="opacity"
      values="0;0;0;0;0.82;0;0;0.62;0;0"
      keyTimes="0;0.15;0.19;0.21;0.23;0.26;0.7;0.72;0.75;1"
      dur="7s" repeatCount="indefinite" calcMode="discrete"/>
    <animate attributeName="x"
      values="500;500;500;500;512;500;500;489;500;500"
      keyTimes="0;0.15;0.19;0.21;0.23;0.26;0.7;0.72;0.75;1"
      dur="7s" repeatCount="indefinite" calcMode="discrete"/>
  </text>
  <!-- Bottom strip — cyan, wide offset -->
  <text x="500" y="119"
    font-family="'Rubik Glitch','Orbitron','Courier New',monospace"
    font-weight="400" font-size="62" text-anchor="middle" letter-spacing="10"
    fill="#00ffff" opacity="0" clip-path="url(#gc3)">
    BISU GHALAN
    <animate attributeName="opacity"
      values="0;0;0;0;0;0.58;0;0;0.38;0;0"
      keyTimes="0;0.19;0.2;0.21;0.22;0.23;0.26;0.71;0.73;0.76;1"
      dur="7s" repeatCount="indefinite" calcMode="discrete"/>
    <animate attributeName="x"
      values="500;500;500;500;500;518;500;500;484;500;500"
      keyTimes="0;0.19;0.2;0.21;0.22;0.23;0.26;0.71;0.73;0.76;1"
      dur="7s" repeatCount="indefinite" calcMode="discrete"/>
  </text>

  <!-- ── MAIN TITLE with occasional translate JUMP ── -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,0; 0,0; 0,0; -8,3; 0,0; 6,-2; 0,0; 0,0; 0,0"
      keyTimes="0; 0.1; 0.19; 0.195; 0.2; 0.21; 0.68; 0.7; 0.75; 1"
      dur="7s" repeatCount="indefinite" calcMode="discrete"/>
    <text x="500" y="119"
      font-family="'Rubik Glitch','Orbitron','Courier New',monospace"
      font-weight="400" font-size="62" text-anchor="middle" letter-spacing="10"
      fill="url(#tg)">
      BISU GHALAN
    </text>
  </g>

  <!-- ── DIVIDER LINE UNDER TITLE ── -->
  <rect x="230" y="129" width="540" height="1.5" fill="url(#lg)" opacity="0.75"/>

  <!-- ── TYPING DYNAMIC SUBTITLE ── -->
  <g font-family="'Share Tech Mono','JetBrains Mono','Fira Code','Courier New',monospace" font-size="12.5" text-anchor="start" letter-spacing="3.5">
    <!-- Line 1: Cybersecurity Student -->
    <text x="255" y="151" fill="#a78bfa" opacity="0" clip-path="url(#tp1)">
      &gt; CYBERSECURITY STUDENT @ LINCOLN COLLEGE <tspan fill="#00ffff" font-weight="700">_</tspan>
      <animate attributeName="opacity" values="0;1;1;0" dur="15s" keyTimes="0;0.01;0.18;0.2" repeatCount="indefinite" />
    </text>
    <!-- Line 2: Ethical Hacking -->
    <text x="255" y="151" fill="#a78bfa" opacity="0" clip-path="url(#tp2)">
      &gt; EXPLORING ETHICAL HACKING &amp; CTFs <tspan fill="#00ffff" font-weight="700">_</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" dur="15s" keyTimes="0;0.2;0.21;0.38;0.4" repeatCount="indefinite" />
    </text>
    <!-- Line 3: Bot Development -->
    <text x="255" y="151" fill="#a78bfa" opacity="0" clip-path="url(#tp3)">
      &gt; PYTHON | C++ | BOT DEVELOPMENT <tspan fill="#00ffff" font-weight="700">_</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" dur="15s" keyTimes="0;0.4;0.41;0.58;0.6" repeatCount="indefinite" />
    </text>
    <!-- Line 4: Pentest -->
    <text x="255" y="151" fill="#a78bfa" opacity="0" clip-path="url(#tp4)">
      &gt; PENETRATION TESTING ENTHUSIAST <tspan fill="#00ffff" font-weight="700">_</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" dur="15s" keyTimes="0;0.6;0.61;0.78;0.8" repeatCount="indefinite" />
    </text>
    <!-- Line 5: Always Learning -->
    <text x="255" y="151" fill="#a78bfa" opacity="0" clip-path="url(#tp5)">
      &gt; ALWAYS LEARNING, ALWAYS BUILDING <tspan fill="#00ffff" font-weight="700">_</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" dur="15s" keyTimes="0;0.8;0.81;0.98;1" repeatCount="indefinite" />
    </text>
  </g>

  <!-- ── STATUS BAR ── -->
  <!-- Online dot + label -->
  <circle cx="222" cy="177" r="3.5" fill="#00e676">
    <animate attributeName="opacity" values="1;0.2;1" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  <text x="230" y="181"
    font-family="'Share Tech Mono','Courier New',monospace"
    font-size="8.5" fill="#00e676" opacity="0.7" letter-spacing="1">ONLINE</text>

  <!-- Center status -->
  <text x="500" y="181"
    font-family="'Share Tech Mono','Courier New',monospace"
    font-size="8.5" text-anchor="middle" fill="#374151" letter-spacing="2">
    SYS::SECURE &#9642; MODE::ACTIVE &#9642; v2.0.1
  </text>

  <!-- Right port indicator -->
  <text x="775" y="181"
    font-family="'Share Tech Mono','Courier New',monospace"
    font-size="8.5" text-anchor="end" fill="#00ffff" opacity="0.42" letter-spacing="1">PORT::OPEN</text>
  <circle cx="783" cy="177" r="3.5" fill="#ff0040" opacity="0.48">
    <animate attributeName="opacity" values="0.48;0.08;0.48" dur="1.9s" repeatCount="indefinite"/>
  </circle>

  <!-- ── GLITCH NOISE BLOCKS ── -->
  <rect x="388" y="67" width="58" height="7" fill="#ff0040" opacity="0">
    <animate attributeName="opacity"
      values="0;0;0;0.28;0;0;0;0.18;0;0"
      keyTimes="0;0.18;0.19;0.21;0.24;0.7;0.71;0.73;0.76;1"
      dur="7s" repeatCount="indefinite" calcMode="discrete"/>
  </rect>
  <rect x="548" y="94" width="88" height="6" fill="#00ffff" opacity="0">
    <animate attributeName="opacity"
      values="0;0;0;0;0.2;0;0;0;0"
      keyTimes="0;0.5;0.68;0.7;0.72;0.75;0.9;0.95;1"
      dur="7s" repeatCount="indefinite" calcMode="discrete"/>
  </rect>
  <rect x="310" y="104" width="30" height="5" fill="#a78bfa" opacity="0">
    <animate attributeName="opacity"
      values="0;0;0;0;0;0;0;0.22;0;0"
      keyTimes="0;0.15;0.19;0.21;0.5;0.68;0.7;0.72;0.75;1"
      dur="7s" repeatCount="indefinite" calcMode="discrete"/>
  </rect>

  <!-- ── OVERLAYS ── -->
  <rect width="1000" height="200" fill="url(#scan)" opacity="0.55"/>
  <rect width="1000" height="200" fill="url(#vig)"/>
</svg>