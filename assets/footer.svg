<svg width="1000" height="100" viewBox="0 0 1000 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    ]]></style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1d113c" stroke-width="1.5" opacity="0.6"/>
      <circle cx="40" cy="40" r="1.5" fill="#00ffff" opacity="0.15"/>
    </pattern>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00ffff" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#00ffff"/>
      <stop offset="75%"  stop-color="#ff0040"/>
      <stop offset="100%" stop-color="#ff0040" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d0820"/>
      <stop offset="100%" stop-color="#05040a"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="100" fill="url(#bg)"/>
  <rect width="1000" height="100" fill="url(#grid)" opacity="0.72"/>
  
  <!-- Cyberpunk UI Accents -->
  <g transform="translate(0, 50)">
    <!-- Left marker -->
    <g transform="translate(60, 0)">
       <path d="M -15 0 L 15 0 M 0 -15 L 0 15" stroke="#00ffff" stroke-width="2.5" opacity="0.8">
          <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" repeatCount="indefinite"/>
       </path>
    </g>
    
    <!-- Right marker -->
    <g transform="translate(940, 0)">
       <path d="M -15 0 L 15 0 M 0 -15 L 0 15" stroke="#ff0040" stroke-width="2.5" opacity="0.8">
          <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" begin="1.5s" repeatCount="indefinite"/>
       </path>
    </g>
    
    <!-- Connecting Dashed Line -->
    <line x1="85" y1="0" x2="915" y2="0" stroke="url(#lg)" stroke-width="1.2" stroke-dasharray="12, 6" opacity="0.32"/>

    <!-- Data Stream Nodes (Glowing layers) -->
    <!-- Node 1: Cyan -->
    <circle r="4.5" fill="#00ffff" opacity="0.25">
      <animate attributeName="cx" values="85; 915; 85" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.5" fill="#00ffff">
      <animate attributeName="cx" values="85; 915; 85" dur="4s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Node 2: Magenta (Fast) -->
    <circle r="4" fill="#ff0040" opacity="0.25">
      <animate attributeName="cx" values="915; 85" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" fill="#ff0040">
      <animate attributeName="cx" values="915; 85" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Sporadic Glitch Flash (Horizontal strip) -->
  <rect x="0" y="47" width="1000" height="6" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" values="0;0.18;0;0.25;0;0" keyTimes="0;0.58;0.6;0.62;0.65;1" dur="5s" repeatCount="indefinite" calcMode="discrete"/>
  </rect>

  <!-- Status Label Layered (Simulated Glow) -->
  <g transform="translate(500, 85)" text-anchor="middle" font-family="'Share Tech Mono', monospace" letter-spacing="4">
    <text y="0" font-size="11" fill="#a78bfa" opacity="0.18">SYS::END_OF_DOCUMENT::STATUS_SUCCESS</text>
    <text y="-1" font-size="11" fill="#a78bfa" opacity="0.65">SYS::END_OF_DOCUMENT::STATUS_SUCCESS</text>
  </g>

  <!-- Side Data Bits -->
  <g font-family="'Share Tech Mono', monospace" font-size="7" fill="#374151" opacity="0.6">
    <text x="85" y="85">MEM::FLUSH</text>
    <text x="915" y="85" text-anchor="end">STREAM::CLOSE</text>
  </g>
</svg>
