<svg width="1000" height="100" viewBox="0 0 1000 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Minimalist Black and White Circuit / Wire Divider -->
  <defs>
    <style>
      .sketch {
        fill: none;
        stroke: #1a1a1a;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .node {
        fill: #ffffff;
        stroke: #1a1a1a;
        stroke-width: 2.5;
      }
      .sketch-light {
        fill: none;
        stroke: #1a1a1a;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .node-light {
        fill: #ffffff;
        stroke: #1a1a1a;
        stroke-width: 1.5;
      }
    </style>
  </defs>

  <g transform="translate(0, 50)">
    <!-- Main trace -->
    <path class="sketch" d="M 50,0 L 250,0 L 270,-15 L 350,-15 L 370,0 L 600,0 L 630,20 L 700,20 L 720,0 L 950,0" />
    
    <!-- Branch traces -->
    <path class="sketch" d="M 300,-15 L 320,-35 L 380,-35" />
    <path class="sketch" d="M 660,20 L 680,40 L 750,40" />
    
    <!-- Nodes (vias) -->
    <!-- Start and End Points -->
    <circle class="node" cx="50" cy="0" r="4" />
    <circle class="node" cx="950" cy="0" r="4" />
    
    <!-- Branch Ends -->
    <circle class="node" cx="380" cy="-35" r="3" />
    <circle class="node" cx="750" cy="40" r="3" />
    
    <!-- Inner trace lines for tech feel -->
    <path class="sketch-light" d="M 100,10 L 240,10 L 260,-5" />
    <circle class="node-light" cx="260" cy="-5" r="2.5" />
    
    <path class="sketch-light" d="M 800,-10 L 900,-10 L 920,10" />
    <circle class="node-light" cx="920" cy="10" r="2.5" />
    
    <!-- Extra details -->
    <!-- Some parallel lines -->
    <path class="sketch-light" d="M 400,15 L 420,15 L 430,25" />
    <circle class="node-light" cx="430" cy="25" r="2" />
    
    <path class="sketch-light" d="M 500,-20 L 520,-20 L 530,-10" />
    <circle class="node-light" cx="530" cy="-10" r="2" />
  </g>
  
  <!-- Background Noise / Little dots to simulate pencil specks or grid -->
  <circle fill="#1a1a1a" cx="150" cy="25" r="1.5" opacity="0.6" />
  <circle fill="#1a1a1a" cx="450" cy="80" r="1.5" opacity="0.6" />
  <circle fill="#1a1a1a" cx="580" cy="15" r="1.5" opacity="0.6" />
  <circle fill="#1a1a1a" cx="850" cy="75" r="1.5" opacity="0.6" />
</svg>
